name: Publish

on:
  push:
    tags:
      - '@reelkit/**'
  workflow_dispatch:

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          filter: tree:0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npx nx run-many -t build -p '@reelkit/*'

      - name: Fix dist package.json paths
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const glob = require('path');
            for (const dir of fs.readdirSync('packages')) {
              const distPkg = path.join('packages', dir, 'dist', 'package.json');
              if (!fs.existsSync(distPkg)) continue;
              const pkg = JSON.parse(fs.readFileSync(distPkg, 'utf-8'));
              for (const key of ['main', 'module', 'types']) {
                if (pkg[key]) pkg[key] = pkg[key].replace('./dist/', './');
              }
              if (pkg.exports) {
                for (const [k, v] of Object.entries(pkg.exports)) {
                  if (typeof v === 'string') {
                    pkg.exports[k] = v.replace('./dist/', './');
                  } else if (typeof v === 'object') {
                    for (const [ek, ev] of Object.entries(v)) {
                      if (typeof ev === 'string') v[ek] = ev.replace('./dist/', './');
                    }
                  }
                }
              }
              pkg.files = ['**/*.js', '**/*.d.ts', '**/*.css', 'README.md', 'CHANGELOG.md', '!**/*.tsbuildinfo'];
              fs.writeFileSync(distPkg, JSON.stringify(pkg, null, 2) + '\n');
              console.log('Fixed', distPkg);
            }
          "

      - name: Publish packages
        run: npx nx release publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
