<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="divLine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155" stop-opacity="0"/>
      <stop offset="50%" stop-color="#334155" stop-opacity="1"/>
      <stop offset="100%" stop-color="#334155" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.35" cy="0.2" r="0.4">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.8" cy="0.9" r="0.35">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="#0f172a"/>
  <rect width="1200" height="300" fill="url(#orb1)"/>
  <rect width="1200" height="300" fill="url(#orb2)"/>

  <!-- Logo -->
  <g transform="translate(340, 110)">
    <rect width="80" height="80" rx="20" fill="url(#accent)"/>
    <rect x="28" y="14" width="24" height="4" rx="2" fill="white" opacity=".2"/>
    <rect x="24" y="24" width="32" height="4" rx="2" fill="white" opacity=".35"/>
    <rect x="20" y="34" width="40" height="5" rx="2.5" fill="white" opacity=".5"/>
    <path d="M20 48 L40 68 L60 48" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- ReelKit text -->
  <text x="440" y="165" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="64" font-weight="700" letter-spacing="-2">
    <tspan fill="#ffffff">Reel</tspan><tspan fill="url(#accent)">Kit</tspan>
  </text>

  <!-- Tagline -->
  <text x="442" y="195" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="18" fill="#64748b" font-weight="400">Headless virtualized slider engine</text>

  <!-- Divider -->
  <line x1="730" y1="110" x2="730" y2="190" stroke="url(#divLine)" stroke-width="1"/>

  <!-- Stats -->
  <text x="780" y="148" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="780" y="168" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569" font-weight="500" letter-spacing="1.5" text-anchor="middle">DOM NODES</text>

  <text x="870" y="148" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">0</text>
  <text x="870" y="168" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#475569" font-weight="500" letter-spacing="1.5" text-anchor="middle">DEPENDENCIES</text>
</svg>
